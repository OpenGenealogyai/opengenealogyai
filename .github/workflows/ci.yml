name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install qdrant-client
          pip install -r requirements.txt 2>/dev/null || true

      - name: Set up Node.js (for AJV schema validator)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Run tests
        env:
          PYTHONPATH: agents/ia-fetcher:agents/builder:agents/familysearch:scripts
        run: |
          python -m pytest test/ -v --tb=short 2>&1

      - name: Schema validation smoke test
        run: |
          node schemas/validators/validate-raw-record.js test/fixtures/sample_record.json 2>/dev/null || \
          echo "No fixture file - schema validator present"
