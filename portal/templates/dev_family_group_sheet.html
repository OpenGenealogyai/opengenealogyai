<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Group Sheet — Live from Postgres</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
<style>
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: Georgia, serif; }
  header.bar { background: var(--ink); color: var(--paper); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
  header.bar a { color: var(--gold); text-decoration: none; font-family: var(--font-ui); font-size: var(--text-sm); }
  header.bar .title { font-family: var(--font-body); font-size: var(--text-md); letter-spacing: 0.04em; }
  main { padding: 32px 24px 64px; max-width: 1100px; margin: 0 auto; }
  .demo-note { margin: 0 0 16px; padding: 10px 16px; background: rgba(45, 106, 79, 0.10); border-left: 3px solid var(--success, #2d6a4f); border-radius: var(--radius); font-family: var(--font-ui); font-size: var(--text-sm); }
  .picker { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; font-family: var(--font-ui); font-size: var(--text-sm); }
  .picker label { color: var(--muted); }
  .picker select {
    padding: 6px 10px; border-radius: var(--radius); border: 1px solid var(--border);
    background: white; font-family: var(--font-ui); font-size: var(--text-sm);
    min-width: 360px;
  }
  .picker .status { font-size: var(--text-xs); color: var(--muted); margin-left: auto; }
</style>
</head>
<body>

<header class="bar">
  <span class="title">OpenGenealogyAI · Family Group Sheet</span>
  <a href="/dev/pedigree">→ Pedigree</a>
</header>

<main>
  <div class="demo-note">
    <strong>Live from Postgres ✓</strong> — pick any ancestor; if they're a father
    or mother in the DB, the family group sheet builds from real database rows.
  </div>

  <div class="picker">
    <label for="who">Father or mother:</label>
    <select id="who"></select>
    <span class="status" id="status">Loading…</span>
  </div>

  <maxgen-family-group-sheet id="sheet"></maxgen-family-group-sheet>
</main>

<script type="module" src="{{ url_for('static', filename='components/index.js') }}"></script>
<script>
const $ = (id) => document.getElementById(id);

async function init() {
  $('status').textContent = 'Fetching persons…';
  const people = await fetch('/api/persons').then(r => r.json());
  $('status').textContent = `${people.length} people loaded`;
  const sel = $('who');
  for (const p of people) {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `${p.name}${p.birth ? ' (' + p.birth + ')' : ''}`;
    sel.appendChild(opt);
  }
  // Default: William Bailey Maxwell (he's a father in the DB)
  const def = people.find(p => p.name && p.name.includes('William Bailey Maxwell') && p.birth === 1821) || people[0];
  sel.value = def.id;

  async function refresh() {
    $('status').textContent = 'Loading family…';
    try {
      const fam = await fetch(`/api/family-group-sheet/${sel.value}`).then(r => r.json());
      // Attach the photo for William Bailey from the local FAG archive
      // (the persons mirror doesn't track photos yet)
      if (fam.husband && fam.husband.name_assertions[0].name_as_written.includes('William Bailey Maxwell')) {
        fam.husband.photo_assertions = [{
          photo_id: 'p1', url: '/family-photos/maxwell-william-bailey-1821/portrait_bauer_2009.jpg',
          storage_tier: 'local_private', is_primary: true, confidence: 0.85,
          subject_role: 'solo', license: 'tier2-private',
          alt_text: 'Portrait of William Bailey Maxwell',
          asserted_by: 'omen', asserted_at: '2026-05-17T00:00:00Z'
        }];
      }
      $('sheet').family = fam;
      $('status').textContent = 'Live from Postgres ✓';
    } catch (e) {
      $('status').textContent = 'Error: ' + e.message;
    }
  }
  sel.addEventListener('change', refresh);
  if (window.__maxgenReady) refresh();
  else window.addEventListener('maxgen-ready', refresh);
}

init().catch(e => { $('status').textContent = 'Init failed: ' + e.message; });
</script>
</body>
</html>
