<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>William Bailey Maxwell — OpenGenealogyAI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
<style>
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: Georgia, serif; }
  header.bar {
    background: var(--ink); color: var(--paper);
    padding: 14px 24px;
    display: flex; justify-content: space-between; align-items: center;
  }
  header.bar a { color: var(--gold); text-decoration: none; font-family: var(--font-ui); font-size: var(--text-sm); }
  header.bar .title { font-family: var(--font-body); font-size: var(--text-md); letter-spacing: 0.04em; }
  main { padding: 32px 24px 64px; }
  .demo-note {
    max-width: 1040px; margin: 0 auto 16px;
    padding: 10px 16px;
    background: rgba(212, 168, 67, 0.12);
    border-left: 3px solid var(--gold);
    border-radius: var(--radius);
    font-family: var(--font-ui);
    font-size: var(--text-sm);
  }
</style>
</head>
<body>

<header class="bar">
  <span class="title">OpenGenealogyAI · Person Profile</span>
  <a href="/dev/family-group-sheet">→ Family group sheet</a>
</header>

<main>
  <div class="demo-note">
    <strong>Live demo</strong> — William Bailey Maxwell's profile. Hero with portrait, tabs for
    Facts / Family / Photos / DNA / Sources. The "Search the web" button fans out to 7 genealogy
    sites (task #13).
  </div>

  <maxgen-person-profile id="profile"></maxgen-person-profile>
</main>

<script type="module" src="{{ url_for('static', filename='components/index.js') }}"></script>
<script>
const NOW = "2026-05-17T00:00:00Z";
const SNIPPET = 0.78, PRIMARY = 0.92;
function mkPerson(opts) {
  const p = {
    person_id: opts.id,
    schema_version: "1.4",
    is_living: false,
    composite_confidence: opts.composite || PRIMARY,
    name_assertions: [{
      name_as_written: opts.name,
      given_name: opts.given,
      surname: opts.surname,
      name_type: "birth",
      confidence: PRIMARY,
      source_record_id: "fag-" + opts.id,
      asserted_by: "omen-pipeline-fag-handoff",
      asserted_at: NOW
    }],
    birth_assertions: opts.birth ? [{...opts.birth, confidence: SNIPPET, source_record_id: "fag-" + opts.id, asserted_by: "omen-pipeline", asserted_at: NOW}] : [],
    death_assertions: opts.death ? [{...opts.death, confidence: SNIPPET, source_record_id: "fag-" + opts.id, asserted_by: "omen-pipeline", asserted_at: NOW}] : [],
    asserted_by: "omen-pipeline",
    asserted_at: NOW
  };
  if (opts.photo) {
    p.photo_assertions = [{
      photo_id: "ph-" + opts.id,
      url: opts.photo,
      storage_tier: "local_private",
      caption: opts.caption || opts.name,
      alt_text: opts.alt || `Portrait of ${opts.name}`,
      is_primary: true,
      confidence: 0.85,
      subject_role: "solo",
      license: "tier2-private",
      asserted_by: "omen-pipeline",
      asserted_at: NOW
    }];
  }
  if (opts.occupation) {
    p.occupation_assertions = [{
      occupation_as_written: opts.occupation,
      confidence: 0.85,
      source_record_id: "fag-" + opts.id,
      asserted_by: "omen-pipeline",
      asserted_at: NOW
    }];
  }
  if (opts.events) p.event_assertions = opts.events.map(e => ({...e, confidence: SNIPPET, source_record_id: "fag-" + opts.id, asserted_by: "omen-pipeline", asserted_at: NOW}));
  if (opts.parents) p.parent_assertions = opts.parents;
  if (opts.source_record_ids) p.source_record_ids = opts.source_record_ids;
  return p;
}

const william = mkPerson({
  id: "william-bailey-maxwell-1821",
  name: "William Bailey Maxwell",
  given: "William Bailey",
  surname: "Maxwell",
  birth: { year_min: 1821, year_max: 1821, month: 3, day: 14, date_type: "exact", place_as_written: "Shawneetown, Gallatin County, Illinois, USA" },
  death: { year_min: 1895, year_max: 1895, month: 8, day: 26, date_type: "exact", place_as_written: "Mesa, Maricopa County, Arizona, USA" },
  photo: "/family-photos/maxwell-william-bailey-1821/portrait_bauer_2009.jpg",
  alt: "Portrait of William Bailey Maxwell, Mormon Battalion veteran",
  occupation: "Mormon Battalion soldier, Company D",
  events: [
    { event_type: "military_service", year_min: 1846, year_max: 1847, place_as_written: "Mexican-American War", description: "Company D, Mormon Battalion" },
    { event_type: "residence", year_min: 1859, year_max: 1869, place_as_written: "Utah County, Utah, USA", description: "settlement leadership" },
    { event_type: "residence", year_min: 1870, year_max: 1880, place_as_written: "Glendale / Kane County, Utah", description: "southern Utah pioneer" },
  ],
  parents: [
    { parent_person_id: "richard-maxwell-1796", parent_name: "Richard Maxwell", relationship_type: "biological", parent_role: "father", confidence: 0.88, source_record_id: "fag-richard-1796", asserted_by: "omen-pipeline", asserted_at: NOW },
    { parent_person_id: "ruth-hodge-1800", parent_name: "Ruth Hodge Barnett", relationship_type: "biological", parent_role: "mother", confidence: 0.88, source_record_id: "fag-ruth-hodge-1800", asserted_by: "omen-pipeline", asserted_at: NOW },
  ],
  source_record_ids: ["fag-35124852", "fag-156944159", "fag-47043357"]
});

const father = mkPerson({ id:"richard-maxwell-1796", name:"Richard Maxwell", given:"Richard", surname:"Maxwell", birth:{year_min:1796,year_max:1796,date_type:"exact"}, death:{year_min:1821,year_max:1821,date_type:"exact"} });
const mother = mkPerson({ id:"ruth-hodge-1800", name:"Ruth Hodge Barnett", given:"Ruth", surname:"Hodge Barnett", birth:{year_min:1800,year_max:1800,date_type:"estimated"}, death:{year_min:1875,year_max:1875,date_type:"estimated"} });
const wife = mkPerson({ id:"lucretia-bracken-1823", name:"Lucretia Charlotte Bracken", given:"Lucretia Charlotte", surname:"Bracken", birth:{year_min:1823,year_max:1823,date_type:"exact"}, death:{year_min:1893,year_max:1893,date_type:"exact"} });
const james = mkPerson({ id:"james-bailey-maxwell-1843", name:"James Bailey Maxwell", given:"James Bailey", surname:"Maxwell", birth:{year_min:1843,year_max:1843,month:8,day:30,date_type:"exact"}, death:{year_min:1876,year_max:1876,month:7,day:16,date_type:"exact"} });
const ruth = mkPerson({ id:"ruth-maxwell-1845", name:"Ruth Maxwell", given:"Ruth", surname:"Maxwell", birth:{year_min:1845,year_max:1845,date_type:"exact"}, death:{year_min:1845,year_max:1845,date_type:"exact"} });

function setProfile() {
  const el = document.getElementById('profile');
  el.person = william;
  el.family = {
    father, mother,
    spouses: [wife],
    children: [james, ruth]
  };
}
if (window.__maxgenReady) setProfile();
else window.addEventListener('maxgen-ready', setProfile);
</script>
</body>
</html>
